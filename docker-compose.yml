# Docker Compose for the Mastra playground (Next.js).
#
# Usage:
#   cp .env.example .env
#   # edit .env to set GOOGLE_GENERATIVE_AI_API_KEY (or configure OpenRouter)
#   docker compose up --build
#
# Then open http://localhost:8917

services:
  playground:
    build: .
    image: mastra-playground:latest
    container_name: mastra-playground
    restart: unless-stopped
    ports:
      - '8917:8917'
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 8917
      NEXT_TELEMETRY_DISABLED: 1
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:8917/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
