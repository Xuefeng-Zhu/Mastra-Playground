name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint + Typecheck + Test + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Format check
        run: npm run format:check
      - name: TypeScript type check
        run: npm run typecheck
      - name: Tests and coverage thresholds
        run: npm run test:coverage
      - name: Documentation links
        run: npm run docs:check
      - name: Build Next.js app
        run: npm run build
      - name: Build artifacts exist
        run: |
          test -d .next
          test -d .next/static

  smoke:
    name: Server smoke test
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Boot server and run smoke suite
        env:
          OPENAI_API_KEY: sk-ci-not-used
        run: |
          npm run start > /tmp/serve.log 2>&1 &
          PID=$!
          trap 'kill $PID 2>/dev/null || true; cat /tmp/serve.log' EXIT
          for attempt in {1..20}; do
            curl --fail --silent http://localhost:8917/api/health && break
            if [ "$attempt" = 20 ]; then exit 1; fi
            sleep 1
          done
          npm run smoke
